<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Blink Detection</title>

    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* Body Styling */
        body {
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Navbar */
        .navbar {
            width: 100%;
            background: #1f1f1f;
            padding: 15px 0;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(255, 64, 129, 0.2);
        }

        /* Main Container */
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
            text-align: center;
            width: 80%;
            max-width: 600px;
            margin-top: 30px;
        }

        /* Heading */
        h1 {
            font-size: 2em;
            margin-bottom: 15px;
            color: #ff4081;
        }

        /* Button */
        button {
            background: linear-gradient(135deg, #ff5c8a, #ff4081);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 4px 12px rgba(255, 64, 129, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #ff4081, #ff5c8a);
            transform: scale(1.05);
        }

        /* Video Frame */
        #video {
            width: 100%;
            max-width: 700px;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
            border: 3px solid #ff4081;
            box-shadow: 0 4px 12px rgba(255, 64, 129, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                width: 90%;
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            button {
                font-size: 1em;
                padding: 10px 20px;
            }
        }
    </style>

    <script type="text/javascript">
        function startCamera() {
            document.getElementById('video').src = "{{ url_for('video_feed') }}";
        }
    </script>
</head>
<body>
    <div class="navbar">Vision-Based Eye Blink Monitoring & Tracking</div>
    
    <div class="container">
        <h1>Real-Time Eye Blink Tracking</h1>
        <button onclick="startCamera()">Start Camera</button>
        <br><br>
        <img id="video" />
    </div>
</body>
</html>
